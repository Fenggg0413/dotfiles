[manager]
show_hidden = false
sort_by = "alphabetical"
sort_sensitive = false
sort_reverse = false
sort_dir_first = true
linemode = "none"
show_symlink = true

[preview]
tab_size = 2
max_width = 800
max_height = 600
cache_dir = ""

[opener]
edit = [
  { run = 'nvim "$@"', block = true, for = "unix" },
]
play = [
  { run = 'open "$@"', orphan = true, for = "macos" },
  { run = 'xdg-open "$@"', orphan = true, for = "linux" },
]

[open]
rules = [
  { mime = "image/*", use = [ "open", "reveal" ] },
  { mime = "video/*", use = [ "open", "play" ] },
  { mime = "audio/*", use = [ "open", "play" ] },
  { mime = "application/pdf", use = [ "open", "reveal" ] },
  { url = "*.zip", use = [ "open", "reveal" ] },
  { url = "*.tar*", use = [ "open", "reveal" ] },
  { url = "*.rar", use = [ "open", "reveal" ] },
  { url = "*.7z", use = [ "open", "reveal" ] },
  { url = "*.json", use = [ "edit", "reveal" ] },
  { url = "*.toml", use = [ "edit", "reveal" ] },
  { url = "*.yaml", use = [ "edit", "reveal" ] },
  { url = "*.yml", use = [ "edit", "reveal" ] },
  { url = "*.md", use = [ "edit", "reveal" ] },
  { mime = "text/*", use = [ "edit", "reveal" ] },
  { mime = "*", use = [ "open", "reveal" ] },
]

[tasks]
micro_workers = 5
macro_workers = 10
bizarre_retry = 2
