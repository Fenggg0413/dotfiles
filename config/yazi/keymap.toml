# Yazi keymap — vim-style defaults with minor adjustments

[manager]
keymap = [
  { on = [ "<Esc>" ],       run = "escape",       desc = "Exit visual mode / cancel" },
  { on = [ "q" ],           run = "quit",          desc = "Quit" },
  { on = [ "Q" ],           run = "quit --no-cwd-file", desc = "Quit (no cwd file)" },
  { on = [ "<C-z>" ],       run = "suspend",       desc = "Suspend" },
  { on = [ "<Space>" ],     run = "toggle",        desc = "Toggle selection" },
  { on = [ "v" ],           run = "visual_mode",   desc = "Visual mode" },
  { on = [ "V" ],           run = "visual_mode --unset", desc = "Exit visual mode" },
  { on = [ "<C-a>" ],       run = "select_all",    desc = "Select all" },
  { on = [ "y" ],           run = "yank",          desc = "Yank" },
  { on = [ "x" ],           run = "yank --cut",    desc = "Cut" },
  { on = [ "p" ],           run = "paste",         desc = "Paste" },
  { on = [ "P" ],           run = "paste --force", desc = "Paste (force)" },
  { on = [ "-" ],           run = "link",          desc = "Create symlink" },
  { on = [ "_" ],           run = "link --relative", desc = "Create relative symlink" },
  { on = [ "d" ],           run = "remove",        desc = "Move to trash" },
  { on = [ "D" ],           run = "remove --perm", desc = "Delete permanently" },
  { on = [ "a" ],           run = "create",        desc = "Create file" },
  { on = [ "A" ],           run = "create --dir",  desc = "Create directory" },
  { on = [ "r" ],           run = "rename",        desc = "Rename" },
  { on = [ ";" ],           run = "shell",         desc = "Run a command" },
  { on = [ ":" ],           run = "shell --block", desc = "Run a blocking command" },
  { on = [ "." ],           run = "hidden",        desc = "Toggle hidden files" },
  { on = [ "z" ],           run = "jump",          desc = "zoxide jump" },
  { on = [ "Z" ],           run = "jump --hovered",    desc = "zoxide jump (hovered)" },
  { on = [ "s" ],           run = "search",        desc = "Search by fd" },
  { on = [ "S" ],           run = "search --hidden",  desc = "Search by fd (hidden)" },
  { on = [ "<C-s>" ],       run = "search --glob", desc = "Search by glob" },
  { on = [ "<C-f>" ],       run = "filter",        desc = "Filter" },
  { on = [ "<Enter>" ],     run = "open",          desc = "Open selected" },
  { on = [ "<C-Enter>" ],   run = "open --interactive", desc = "Open with..." },
  { on = [ "o" ],           run = "open --hovered", desc = "Open hovered" },
  { on = [ "O" ],           run = "open --hovered --interactive", desc = "Open hovered with..." },
  { on = [ "g" ],           run = [ "escape --visual", "arrow top" ],   desc = "Go to top" },
  { on = [ "G" ],           run = [ "escape --visual", "arrow bot" ],   desc = "Go to bottom" },
  { on = [ "h" ],           run = "arrow -1",      desc = "Leave parent dir" },
  { on = [ "l" ],           run = "arrow 1",       desc = "Enter child dir" },
  { on = [ "k" ],           run = "arrow -1 --dir", desc = "Move up" },
  { on = [ "j" ],           run = "arrow 1 --dir", desc = "Move down" },
  { on = [ "H" ],           run = "back",          desc = "Back" },
  { on = [ "L" ],           run = "forward",       desc = "Forward" },
  { on = [ "K" ],           run = "arrow -5 --dir", desc = "Move up 5" },
  { on = [ "J" ],           run = "arrow 5 --dir", desc = "Move down 5" },
  { on = [ "<C-u>" ],       run = "arrow -10 --dir", desc = "Move up 10" },
  { on = [ "<C-d>" ],       run = "arrow 10 --dir", desc = "Move down 10" },
  { on = [ "~" ],           run = "cd ~",          desc = "Go to home" },
  { on = [ "`" ],           run = "cd /",          desc = "Go to root" },
  { on = [ "<Tab>" ],       run = "tab",           desc = "Switch tab" },
  { on = [ "1" ],           run = "tab 1",         desc = "Tab 1" },
  { on = [ "2" ],           run = "tab 2",         desc = "Tab 2" },
  { on = [ "3" ],           run = "tab 3",         desc = "Tab 3" },
  { on = [ "4" ],           run = "tab 4",         desc = "Tab 4" },
  { on = [ "5" ],           run = "tab 5",         desc = "Tab 5" },
  { on = [ "w" ],           run = "tasks_show",    desc = "Show tasks" },
  { on = [ "m" ],           run = "toggle_max",    desc = "Toggle maximize preview" },
  { on = [ "f" ],           run = "filter",        desc = "Filter" },
  { on = [ "/" ],           run = "find",          desc = "Find by fzf" },
  { on = [ "?" ],           run = "find --hidden", desc = "Find by fzf (hidden)" },
]

[select]
keymap = [
  { on = [ "<Esc>" ],       run = "close",         desc = "Cancel selection" },
  { on = [ "<C-Enter>" ],   run = "close --submit", desc = "Submit selection" },
  { on = [ "<Enter>" ],     run = "close --submit", desc = "Submit selection" },
  { on = [ "k" ],           run = "arrow -1",      desc = "Move up" },
  { on = [ "j" ],           run = "arrow 1",       desc = "Move down" },
]

[input]
keymap = [
  { on = [ "<Esc>" ],       run = "close",         desc = "Cancel input" },
  { on = [ "<C-c>" ],       run = "close",         desc = "Cancel input" },
  { on = [ "<Enter>" ],     run = "close --submit", desc = "Submit input" },
]

[tasks]
keymap = [
  { on = [ "<Esc>" ],       run = "close",         desc = "Hide tasks" },
  { on = [ "w" ],           run = "close",         desc = "Hide tasks" },
  { on = [ "x" ],           run = "close --cancel", desc = "Cancel tasks" },
]

[help]
keymap = [
  { on = [ "<Esc>" ],       run = "escape",        desc = "Clear filter" },
  { on = [ "q" ],           run = "close",         desc = "Close help" },
]
