# Yazi keymap — v26 compatible

[mgr]
keymap = [
  { on = [ "<Esc>" ],       run = "escape",             desc = "Exit visual mode / cancel" },
  { on = [ "q" ],           run = "quit",               desc = "Quit" },
  { on = [ "Q" ],           run = "quit --no-cwd-file", desc = "Quit (no cwd file)" },
  { on = [ "<C-z>" ],       run = "suspend",            desc = "Suspend" },
  { on = [ "<Space>" ],     run = "toggle",             desc = "Toggle selection" },
  { on = [ "v" ],           run = "visual_mode",        desc = "Visual mode" },
  { on = [ "V" ],           run = "visual_mode --unset",desc = "Exit visual mode" },
  { on = [ "<C-a>" ],       run = "toggle_all",         desc = "Select all" },
  { on = [ "y" ],           run = "yank",               desc = "Yank" },
  { on = [ "x" ],           run = "yank --cut",         desc = "Cut" },
  { on = [ "p" ],           run = "paste",              desc = "Paste" },
  { on = [ "P" ],           run = "paste --force",      desc = "Paste (force)" },
  { on = [ "-" ],           run = "link",               desc = "Create symlink" },
  { on = [ "_" ],           run = "link --relative",    desc = "Create relative symlink" },
  { on = [ "d" ],           run = "remove",             desc = "Move to trash" },
  { on = [ "D" ],           run = "remove --permanently", desc = "Delete permanently" },
  { on = [ "a" ],           run = "create",             desc = "Create file" },
  { on = [ "A" ],           run = "create --dir",       desc = "Create directory" },
  { on = [ "r" ],           run = "rename",             desc = "Rename" },
  { on = [ ";" ],           run = "shell",              desc = "Run a command" },
  { on = [ ":" ],           run = "shell --block",      desc = "Run a blocking command" },
  { on = [ "." ],           run = "hidden toggle",      desc = "Toggle hidden files" },
  { on = [ "z" ],           run = "plugin zoxide",      desc = "zoxide jump" },
  { on = [ "Z" ],           run = "plugin zoxide --hovered", desc = "zoxide jump (hovered)" },
  { on = [ "s" ],           run = "search --via=fd",    desc = "Search by fd" },
  { on = [ "S" ],           run = "search --via=fd --hidden", desc = "Search by fd (hidden)" },
  { on = [ "<C-s>" ],       run = "escape --search",    desc = "Cancel search" },
  { on = [ "f" ],           run = "filter --smart",     desc = "Filter" },
  { on = [ "/" ],           run = "find --smart",       desc = "Find by fzf" },
  { on = [ "<C-h>" ],       run = "find --previous --smart", desc = "Find previous by fzf" },
  { on = [ "?", ],          run = "help",               desc = "Help" },
  { on = [ "<F1>" ],        run = "help",               desc = "Help" },
  { on = [ "<Enter>" ],     run = "open",               desc = "Open selected" },
  { on = [ "<C-Enter>" ],   run = "open --interactive", desc = "Open with..." },
  { on = [ "o" ],           run = "open --hovered",     desc = "Open hovered" },
  { on = [ "O" ],           run = "open --hovered --interactive", desc = "Open hovered with..." },
  { on = [ "g" ],           run = "arrow top",          desc = "Go to top" },
  { on = [ "G" ],           run = "arrow bot",          desc = "Go to bottom" },
  { on = [ "h" ],           run = "leave",              desc = "Leave parent dir" },
  { on = [ "l" ],           run = "enter",             desc = "Enter child dir" },
  { on = [ "k" ],           run = "arrow prev",        desc = "Move up" },
  { on = [ "j" ],           run = "arrow next",        desc = "Move down" },
  { on = [ "<Left>" ],      run = "leave",             desc = "Leave parent dir" },
  { on = [ "<Right>" ],     run = "enter",             desc = "Enter child dir" },
  { on = [ "<Up>" ],        run = "arrow prev",        desc = "Move up" },
  { on = [ "<Down>" ],      run = "arrow next",        desc = "Move down" },
  { on = [ "H" ],           run = "back",               desc = "Back" },
  { on = [ "L" ],           run = "forward",            desc = "Forward" },
  { on = [ "K" ],           run = "arrow -5",           desc = "Move up 5" },
  { on = [ "J" ],           run = "arrow 5",            desc = "Move down 5" },
  { on = [ "<C-u>" ],       run = "arrow -10",          desc = "Move up 10" },
  { on = [ "<C-d>" ],       run = "arrow 10",           desc = "Move down 10" },
  { on = [ "~" ],           run = "cd ~",               desc = "Go to home" },
  { on = [ "`" ],           run = "cd /",               desc = "Go to root" },
  { on = [ "<Tab>" ],       run = "spot",               desc = "Spot hovered" },
  { on = [ "1" ],           run = "tab_switch 0",       desc = "Tab 1" },
  { on = [ "2" ],           run = "tab_switch 1",       desc = "Tab 2" },
  { on = [ "3" ],           run = "tab_switch 2",       desc = "Tab 3" },
  { on = [ "4" ],           run = "tab_switch 3",       desc = "Tab 4" },
  { on = [ "5" ],           run = "tab_switch 4",       desc = "Tab 5" },
  { on = [ "w" ],           run = "tasks:show",         desc = "Show tasks" },
  { on = [ "m" ],           run = "toggle_max",         desc = "Toggle maximize preview" },
]

[spot]
keymap = [
  { on = [ "<Esc>" ],       run = "close",              desc = "Cancel spot" },
  { on = [ "k" ],           run = "arrow prev",         desc = "Move up" },
  { on = [ "j" ],           run = "arrow next",         desc = "Move down" },
  { on = [ "<Enter>" ],     run = "close --submit",     desc = "Submit" },
]

[pick]
keymap = [
  { on = [ "<Esc>" ],       run = "close",              desc = "Cancel pick" },
  { on = [ "k" ],           run = "arrow prev",         desc = "Move up" },
  { on = [ "j" ],           run = "arrow next",         desc = "Move down" },
  { on = [ "<Enter>" ],     run = "close --submit",     desc = "Submit" },
]

[input]
keymap = [
  { on = [ "<Esc>" ],       run = "escape",             desc = "Cancel input" },
  { on = [ "<C-c>" ],       run = "close",              desc = "Cancel input" },
  { on = [ "<Enter>" ],     run = "close --submit",     desc = "Submit input" },
  { on = [ "<Backspace>" ], run = "backspace",          desc = "Delete previous character" },
  { on = [ "<Delete>" ],    run = "backspace --under",  desc = "Delete next character" },
  { on = [ "<Left>" ],      run = "move -1",            desc = "Move cursor left" },
  { on = [ "<Right>" ],     run = "move 1",             desc = "Move cursor right" },
  { on = [ "<Home>" ],      run = "move -999",          desc = "Move to line start" },
  { on = [ "<End>" ],       run = "move 999",           desc = "Move to line end" },
]

[tasks]
keymap = [
  { on = [ "<Esc>" ],       run = "close",              desc = "Hide tasks" },
  { on = [ "w" ],           run = "close",              desc = "Hide tasks" },
  { on = [ "x" ],           run = "cancel",             desc = "Cancel tasks" },
]

[help]
keymap = [
  { on = [ "<Esc>" ],       run = "escape",             desc = "Clear filter / hide" },
  { on = [ "q" ],           run = "close",              desc = "Close help" },
  { on = [ "k" ],           run = "arrow prev",         desc = "Move up" },
  { on = [ "j" ],           run = "arrow next",         desc = "Move down" },
]
